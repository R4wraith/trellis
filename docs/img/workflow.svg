<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1010 380" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1010" height="380" fill="#ffffff"/>

  <text x="505" y="34" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">From idea to production — the Trellis workflow</text>
  <text x="505" y="58" text-anchor="middle" font-size="14" fill="#6b7280">you plan and review at the seams · Claude Code + Trellis build the rest, autonomously</text>

  <!-- node 1: Plan -->
  <rect x="22" y="92" width="178" height="120" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="111" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">1 · Plan</text>
  <text x="111" y="150" text-anchor="middle" font-size="12.5" fill="#4b5563">Claude app · Opus 4.8</text>
  <text x="111" y="168" text-anchor="middle" font-size="12.5" fill="#4b5563">clean session, no code</text>
  <text x="111" y="190" text-anchor="middle" font-size="12.5" fill="#4b5563">think the product through</text>

  <!-- idea.md doc node -->
  <path d="M236 112 h108 l18 18 v62 h-126 z" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <path d="M344 112 v18 h18 z" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="299" y="150" text-anchor="middle" font-size="13.5" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#92400e">idea.md</text>
  <text x="299" y="170" text-anchor="middle" font-size="11.5" fill="#92400e">high-level design</text>
  <text x="299" y="186" text-anchor="middle" font-size="11.5" fill="#92400e">+ milestones</text>

  <!-- node 2: Scaffold -->
  <rect x="398" y="92" width="190" height="120" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="493" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">2 · Scaffold</text>
  <text x="493" y="150" text-anchor="middle" font-size="12.5" fill="#4b5563">Claude Code + Trellis</text>
  <text x="493" y="168" text-anchor="middle" font-size="12.5" fill="#4b5563">reads idea.md, makes the</text>
  <text x="493" y="184" text-anchor="middle" font-size="12.5" fill="#4b5563">architecture calls, writes</text>
  <text x="493" y="200" text-anchor="middle" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#4338ca">.claude/</text>

  <!-- node 3: Build -->
  <rect x="624" y="92" width="200" height="120" rx="12" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="724" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">3 · Build</text>
  <text x="724" y="150" text-anchor="middle" font-size="12.5" fill="#4b5563">fresh session → /start</text>
  <text x="724" y="168" text-anchor="middle" font-size="12.5" fill="#4b5563">autonomous loop,</text>
  <text x="724" y="184" text-anchor="middle" font-size="12.5" fill="#4b5563">agent teams do the work</text>

  <!-- milestone review loop above Build -->
  <path d="M676 92 C 676 56, 772 56, 772 90" fill="none" stroke="#0d9488" stroke-width="1.8"/>
  <polygon points="772,92 766,81 778,81" fill="#0d9488"/>
  <text x="724" y="50" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0d9488">review at each milestone</text>

  <!-- node 4: Production -->
  <rect x="858" y="92" width="130" height="120" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="923" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Production</text>
  <text x="923" y="164" text-anchor="middle" font-size="12" fill="#166534">real, tested</text>
  <text x="923" y="180" text-anchor="middle" font-size="12" fill="#166534">software</text>

  <!-- arrows -->
  <g stroke="#9ca3af" stroke-width="2" fill="#9ca3af">
    <line x1="200" y1="152" x2="232" y2="152"/><polygon points="234,152 224,146 224,158"/>
    <line x1="362" y1="152" x2="394" y2="152"/><polygon points="396,152 386,146 386,158"/>
    <line x1="588" y1="152" x2="620" y2="152"/><polygon points="622,152 612,146 612,158"/>
    <line x1="824" y1="152" x2="854" y2="152"/><polygon points="856,152 846,146 846,158"/>
  </g>

  <!-- human-seam band -->
  <rect x="22" y="248" width="966" height="50" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="505" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">You own the seams: the design (idea.md) + the milestone reviews + the occasional fork.</text>
  <text x="505" y="288" text-anchor="middle" font-size="12.5" fill="#4338ca">Trellis owns the implementation cycle. Design goal: most of the build runs without you.</text>

  <text x="505" y="332" text-anchor="middle" font-size="12.5" fill="#9ca3af">Long, multi-feature sessions — explore → design → plan → implement, milestone after milestone, with context carried throughout.</text>
</svg>
