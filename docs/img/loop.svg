<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 720" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="620" height="720" fill="#ffffff"/>

  <text x="310" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">The autonomous loop</text>
  <text x="310" y="60" text-anchor="middle" font-size="14" fill="#6b7280">run <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#4f46e5">/start</tspan> → it keeps going, slice after slice, until done</text>

  <!-- step boxes: x 150..470 (w320), centered ~310 -->
  <g>
    <rect x="150" y="78"  width="320" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="166" y="100" font-size="13.5" font-weight="700" fill="#1f2937">1 · Orient</text>
    <text x="166" y="118" font-size="12" fill="#4b5563">recall memory, read GOAL / STATE / PROGRESS / DESIGN</text>

    <rect x="150" y="156" width="320" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="166" y="178" font-size="13.5" font-weight="700" fill="#1f2937">2 · Check the approach</text>
    <text x="166" y="196" font-size="12" fill="#4b5563">simplest thing that works? wrap &gt; build, defer, simplify</text>

    <rect x="150" y="234" width="320" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="166" y="256" font-size="13.5" font-weight="700" fill="#1f2937">3 · Build</text>
    <text x="166" y="274" font-size="12" fill="#4b5563">dispatch the right specialist subagent(s)</text>

    <rect x="150" y="312" width="320" height="52" rx="10" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="166" y="334" font-size="13.5" font-weight="700" fill="#1f2937">4 · Verify</text>
    <text x="166" y="352" font-size="12" fill="#4b5563">read-only reviewer + tests &amp; fuzzing — fix, don't fake</text>

    <rect x="150" y="390" width="320" height="52" rx="10" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="166" y="412" font-size="13.5" font-weight="700" fill="#1f2937">5 · Integrate</text>
    <text x="166" y="430" font-size="12" fill="#4b5563">end-to-end smoke test in the real build</text>

    <rect x="150" y="468" width="320" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="166" y="490" font-size="13.5" font-weight="700" fill="#1f2937">6 · Commit</text>
    <text x="166" y="508" font-size="12" fill="#4b5563">small atomic commit — only when green</text>

    <rect x="150" y="546" width="320" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="166" y="568" font-size="13.5" font-weight="700" fill="#1f2937">7 · Record</text>
    <text x="166" y="586" font-size="12" fill="#4b5563">honest status: works / stubbed / next</text>
  </g>

  <!-- down arrows between steps -->
  <g stroke="#9ca3af" stroke-width="2" fill="#9ca3af">
    <line x1="310" y1="130" x2="310" y2="154"/><polygon points="310,156 304,146 316,146"/>
    <line x1="310" y1="208" x2="310" y2="232"/><polygon points="310,234 304,224 316,224"/>
    <line x1="310" y1="286" x2="310" y2="310"/><polygon points="310,312 304,302 316,302"/>
    <line x1="310" y1="364" x2="310" y2="388"/><polygon points="310,390 304,380 316,380"/>
    <line x1="310" y1="442" x2="310" y2="466"/><polygon points="310,468 304,458 316,458"/>
    <line x1="310" y1="520" x2="310" y2="544"/><polygon points="310,546 304,536 316,536"/>
  </g>

  <!-- repeat arrow: from box7 right, up the right margin, into box1 right -->
  <path d="M470 572 C 540 572, 540 104, 472 104" fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="0"/>
  <polygon points="472,104 484,98 484,110" fill="#4f46e5"/>
  <text x="556" y="340" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4f46e5" transform="rotate(90 556 340)">repeat until the build order is done</text>

  <!-- stop & ask branch: dashed, left margin -->
  <path d="M150 338 L 64 338 L 64 648 L 138 648" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5"/>
  <polygon points="138,648 126,642 126,654" fill="#ef4444"/>
  <rect x="140" y="620" width="360" height="56" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="320" y="642" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Stop &amp; ask — one focused question</text>
  <text x="320" y="660" text-anchor="middle" font-size="12" fill="#9b1c1c">only for an irreversible action, a real fork, or a genuine blocker</text>

  <text x="310" y="704" text-anchor="middle" font-size="12" fill="#9ca3af">Hooks block destructive commands at every step — the loop can't be talked into rm -rf.</text>
</svg>
