<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="560" fill="#ffffff"/>

  <text x="440" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Trellis — one drop-in <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#4f46e5">.claude/</tspan> folder</text>
  <text x="440" y="64" text-anchor="middle" font-size="14" fill="#6b7280">Drag it into any project. Claude Code loads it automatically — no setup files scattered around.</text>

  <!-- project container -->
  <rect x="34" y="92" width="494" height="424" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="52" y="118" font-size="14" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#334155">your-project/</text>

  <!-- .claude box -->
  <rect x="54" y="132" width="318" height="368" rx="11" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="70" y="156" font-size="14" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#4338ca">.claude/  — the harness</text>

  <!-- component chips -->
  <g font-size="12.5" fill="#1f2937">
    <rect x="70" y="168" width="286" height="40" rx="7" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="82" y="184" font-weight="700">CLAUDE.md</text><text x="82" y="200" fill="#6b7280">the constitution — how the agent works</text>

    <rect x="70" y="214" width="286" height="40" rx="7" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="82" y="230" font-weight="700">DESIGN.md</text><text x="82" y="246" fill="#6b7280">what we're building (keystone + build order)</text>

    <rect x="70" y="260" width="286" height="40" rx="7" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="82" y="276" font-weight="700">GOAL · STATE · PROGRESS · DECISIONS</text><text x="82" y="292" fill="#6b7280">the build journal (git is source of truth)</text>

    <rect x="70" y="306" width="286" height="40" rx="7" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="82" y="322" font-weight="700">commands/</text><text x="82" y="338" fill="#6b7280">/start  /goal  /loop  /status</text>

    <rect x="70" y="352" width="286" height="40" rx="7" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="82" y="368" font-weight="700">agents/</text><text x="82" y="384" fill="#6b7280">spine roles + per-project component-owners</text>

    <rect x="70" y="398" width="286" height="40" rx="7" fill="#fff7ed" stroke="#fdba74"/>
    <text x="82" y="414" font-weight="700">hooks/ + settings.json</text><text x="82" y="430" fill="#9a6b3f">deterministic guards (block, not ask)</text>

    <rect x="70" y="444" width="286" height="40" rx="7" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="82" y="460" font-weight="700">scripts/ + githooks/</text><text x="82" y="476" fill="#6b7280">tests, lint/secret scan, pre-push gate</text>
  </g>

  <!-- src box -->
  <rect x="384" y="132" width="128" height="368" rx="11" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="448" y="156" text-anchor="middle" font-size="13" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#047857">src/</text>
  <text x="448" y="300" text-anchor="middle" font-size="12.5" fill="#047857">your product</text>
  <text x="448" y="320" text-anchor="middle" font-size="12.5" fill="#047857">code lives</text>
  <text x="448" y="340" text-anchor="middle" font-size="12.5" fill="#047857">at the root —</text>
  <text x="448" y="360" text-anchor="middle" font-size="12.5" fill="#047857">not in</text>
  <text x="448" y="380" text-anchor="middle" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#047857">.claude/</text>

  <!-- arrow .claude -> Claude Code -->
  <line x1="528" y1="300" x2="612" y2="300" stroke="#6b7280" stroke-width="2"/>
  <polygon points="612,300 600,294 600,306" fill="#6b7280"/>
  <text x="570" y="290" text-anchor="middle" font-size="12" fill="#6b7280">auto-loaded</text>

  <!-- Claude Code box -->
  <rect x="616" y="252" width="226" height="96" rx="12" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="729" y="294" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">Claude Code</text>
  <text x="729" y="318" text-anchor="middle" font-size="12.5" fill="#9a6b3f">reads .claude/ every session,</text>
  <text x="729" y="334" text-anchor="middle" font-size="12.5" fill="#9a6b3f">runs the loop, builds your code</text>

  <!-- legend -->
  <text x="440" y="544" text-anchor="middle" font-size="12.5" fill="#6b7280">Spine agents (reviewer · test · integrate · release · perf) are reusable; component-owners are generated to fit your project.</text>
</svg>
